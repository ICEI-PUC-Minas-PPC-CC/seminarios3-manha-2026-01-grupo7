<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Copa de árvore (fundo do perfil) -->
    <circle cx="400" cy="0" r="400" fill="#1B5E20" opacity="0.1"/>
    
    <!-- Frutas/Acentos tropicais vibrantes -->
    <circle cx="650" cy="250" r="30" fill="#FFC107" opacity="0.4"/>
    <circle cx="150" cy="350" r="20" fill="#FF5722" opacity="0.35"/>
    <circle cx="700" cy="500" r="25" fill="#F44336" opacity="0.3"/>
    
    <!-- Palmeiras nas bordas -->
    <path d="M0 800C100 700 300 750 400 850" stroke="#388E3C" stroke-width="60" opacity="0.1"/>
    <path d="M800 800C700 700 500 750 400 850" stroke="#2E7D32" stroke-width="60" opacity="0.1"/>
    
    <!-- Elemento Circular de Foco (atrás da foto de perfil) -->
    <circle cx="400" cy="400" r="250" stroke="#4CAF50" stroke-width="2" stroke-dasharray="30 20" opacity="0.3"/>
</svg>
